name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish (e.g. v1.2.3)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit dist to release tag
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force upload/dist download/dist
          git commit -m "chore: add dist for release ${TAG}"
          git tag -fa "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}" --force

      - name: Update floating major tag
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          MAJOR=$(echo "${TAG}" | cut -d. -f1)
          git tag -fa "${MAJOR}" -m "Update ${MAJOR} to ${TAG}"
          git push origin "${MAJOR}" --force
