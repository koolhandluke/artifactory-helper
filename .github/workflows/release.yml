name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and publish dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit dist to release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force upload/dist download/dist
          git commit -m "chore: add dist for release ${{ github.event.release.tag_name }}"
          git tag -fa ${{ github.event.release.tag_name }} -m "Release ${{ github.event.release.tag_name }}"
          git push origin ${{ github.event.release.tag_name }} --force

      - name: Update floating v1 tag
        run: |
          MAJOR=$(echo "${{ github.event.release.tag_name }}" | cut -d. -f1)
          git tag -fa ${MAJOR} -m "Update ${MAJOR} to ${{ github.event.release.tag_name }}"
          git push origin ${MAJOR} --force
