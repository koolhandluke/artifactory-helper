name: Tag

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  tag:
    name: Create version tag
    # Allow both PR merges and manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Determine bump type from PR labels
        if: github.event_name == 'pull_request'
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          names=$(echo "$LABELS" | jq -r '.[].name')
          if echo "$names" | grep -qx "major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$names" | grep -qx "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create version tags
        env:
          # On workflow_dispatch: use the explicit input.
          # On PR merge: use the label-derived output.
          BUMP: ${{ inputs.bump || steps.bump.outputs.type }}
        run: bash .github/scripts/tags.sh "$BUMP"
