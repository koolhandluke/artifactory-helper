name: 'Upload to Artifactory'
description: 'Upload artifacts to Artifactory'
author: 'kmorfis'
inputs:
  folder:
    description: 'Upload all files in this folder (uses "folder/*" glob — takes priority over files)'
    required: false
  files:
    description: 'Files to upload (space, comma, or semicolon separated)'
    required: false
  publish-build-info:
    description: 'Publish JFrog build info (git metadata + GitHub env). Overrides ARTIFACTORY_PUBLISH_BUILD_INFO env var.'
    required: false
  build-name:
    description: 'JFrog build name. Defaults to GITHUB_REPOSITORY.'
    required: false
  build-number:
    description: 'JFrog build number. Defaults to GITHUB_RUN_NUMBER.'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: 'upload-cloud'
  color: 'green'
