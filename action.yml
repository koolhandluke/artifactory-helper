name: 'Upload to Artifactory'
description: 'Upload artifacts to Artifactory'
author: 'kmorfis'
inputs:
  folder:
    description: 'Upload all files in this folder (uses "folder/*" glob — takes priority over files)'
    required: false
  files:
    description: 'Files to upload (space, comma, or semicolon separated)'
    required: false
  artifactory-path:
    description: 'Override the default path (owner/repo/run_id) with a fixed folder name'
    required: false
runs:
  using: 'node20'
  main: 'upload/dist/index.js'
branding:
  icon: 'upload-cloud'
  color: 'green'
